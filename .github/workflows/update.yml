name: Actualizar Mundial 2026

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Actualizar datos
        run: node update.js

      - name: Commit y push si hay cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html stats_cache.json af_debug.json
          git diff --staged --quiet || (git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push --force)

      - name: Netlify deploy
        run: curl -X POST https://api.netlify.com/build_hooks/6a491f090a5c262be284ce29
